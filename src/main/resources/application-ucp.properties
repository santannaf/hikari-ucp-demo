### DataSource — Oracle UCP (dual-node ADDRESS_LIST)
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.url=jdbc:oracle:thin:@(DESCRIPTION=(CONNECT_TIMEOUT=3)(TRANSPORT_CONNECT_TIMEOUT=3)(RETRY_COUNT=2)(RETRY_DELAY=1)(ADDRESS_LIST=(LOAD_BALANCE=OFF)(FAILOVER=ON)(ADDRESS=(PROTOCOL=TCP)(HOST=localhost)(PORT=1521))(ADDRESS=(PROTOCOL=TCP)(HOST=localhost)(PORT=1522)))(CONNECT_DATA=(SERVICE_NAME=FREEPDB1)))
spring.datasource.username=TEMPLATEBANKING_ADM
spring.datasource.password=adm

### UCP connection factory
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource

### Pool sizing (identical to Hikari for fair comparison)
spring.datasource.oracleucp.initial-pool-size=10
spring.datasource.oracleucp.min-pool-size=10
spring.datasource.oracleucp.max-pool-size=10

### Timeouts
spring.datasource.oracleucp.connection-wait-timeout=3
spring.datasource.oracleucp.inactive-connection-timeout=300
spring.datasource.oracleucp.max-connection-reuse-time=600
spring.datasource.oracleucp.abandoned-connection-timeout=10

### Validation
spring.datasource.oracleucp.validate-connection-on-borrow=true
spring.datasource.oracleucp.sql-for-validate-connection=SELECT 1 FROM DUAL

### Fast Connection Failover (desabilitado - requer ONS/RAC real, sem ons.jar causa NoClassDefFoundError)
spring.datasource.oracleucp.fast-connection-failover-enabled=false

### Performance tuning
spring.datasource.oracleucp.connection-pool-name=ucp-benchmark
spring.datasource.oracleucp.seconds-to-trust-idle-connection=30
spring.datasource.oracleucp.connection-harvest-trigger-count=0
spring.datasource.oracleucp.connection-repurpose-threshold=0
