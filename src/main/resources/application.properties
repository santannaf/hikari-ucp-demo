### Spring Configurations
spring.application.name=hikari-ucp-demo
spring.threads.virtual.enabled=true

### Do not auto-init schema (Oracle startup script handles it)
spring.sql.init.mode=never

### Suppress noisy stack traces during failover benchmarks
logging.level.org.apache.catalina.core=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.springframework.jdbc=WARN
logging.level.oracle.ucp=WARN
logging.level.com.zaxxer.hikari=WARN
spring.web.error.include-stacktrace=never

### Actuator / Micrometer
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
